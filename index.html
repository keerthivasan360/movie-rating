<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineRate Pro - Movie Ratings</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>CineRate<span>.</span></h1>
            <p>Discover the rating of your favorite movies</p>
        </header>

        <main>
            <div class="search-box">
                <input type="text" id="movieInput" placeholder="Enter movie title...">
                <button id="searchBtn">Get Rating</button>
            </div>

            <div id="resultCard" class="result-card hidden">
                <div class="movie-info">
                    <h2 id="movieTitle">Movie Title</h2>
                    <p id="movieGenre">Adventure • Sci-Fi</p>
                </div>
                <div class="rating-circle">
                    <svg viewBox="0 0 36 36" class="circular-chart">
                        <path class="circle-bg"
                          d="M18 2.0845
                            a 15.9155 15.9155 0 0 1 0 31.831
                            a 15.9155 15.9155 0 0 1 0 -31.831"
                        />
                        <path class="circle"
                          stroke-dasharray="0, 100"
                          d="M18 2.0845
                            a 15.9155 15.9155 0 0 1 0 31.831
                            a 15.9155 15.9155 0 0 1 0 -31.831"
                        />
                        <text x="18" y="20.35" class="percentage" id="movieRating">0.0</text>
                    </svg>
                </div>
            </div>
            
            <div id="loading" class="hidden">
                <div class="spinner"></div>
            </div>
            <div id="error" class="hidden">Please enter a valid movie name.</div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
