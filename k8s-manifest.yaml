apiVersion: apps/v1
kind: Deployment
metadata:
  name: movie-rating-app
  labels:
    app: movie-rating
spec:
  replicas: 2
  selector:
    matchLabels:
      app: movie-rating
  template:
    metadata:
      labels:
        app: movie-rating
    spec:
      containers:
      - name: movie-rating
        image: keerthivasan360/movie-rating:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: movie-rating-service
spec:
  type: NodePort
  selector:
    app: movie-rating
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
